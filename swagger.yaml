    post:
      tags: [Asset Handover]
      summary: Cancel a pending asset handover
      description: Only handovers with status "pending" can be cancelled. Once approved, the handover is locked and cannot be cancelled.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Asset handover cancelled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/HandoverResponse" }
        "400": { description: Only pending handovers can be cancelled }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing handover:cancel permission }
        "404": { description: Asset handover not found }

