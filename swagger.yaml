openapi: 3.0.0
info:
  title: SIMAS API
  description: API Documentation for SIMAS Backend (Sistem Management Asset) — Authentication, User, and Asset management.
  version: 2.0.0
servers:
  - url: http://localhost:4000/api
    description: Local development server
  - url: /api
    description: Relative API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Expires in 15 minutes."
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: "Static API key sent via the x-api-key header. Used for machine-to-machine endpoints."

  schemas:
    # --- Base Wrapper Schemas ---
    BaseResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        statusCode: { type: integer, example: 200 }
        message: { type: string, example: "Operation successful" }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer, example: 422 }
        message: { type: string, example: "Validation failed" }
        errors:
          type: object
          example:
            email: "Invalid email format"
            password: "Password must be at least 6 characters"

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "Budi Santoso" }
        email: { type: string, format: email, example: "budi@example.com" }
        password: { type: string, minLength: 6, example: "secret123" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "budi@example.com" }
        password: { type: string, example: "secret123" }

    GoogleLoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, example: "4/0AX4XfWh..." }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, example: "budi@example.com" }

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string, example: "a3f8c2d1e9b4..." }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }

    # --- User Schema ---
    AuthUser:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Budi Santoso" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/photo.jpg" }
        email: { type: string, format: email, example: "budi@example.com" }
        isActive: { type: boolean, example: true }
        role:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Super Admin" }
            isSuperAdmin: { type: boolean, example: true }
            permissions:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer, example: 1 }
                  key: { type: string, example: "asset:read" }

    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/AuthUser" }
        accessToken:
          type: string
          description: "JWT access token, expires in 15 minutes"
          example: "eyJhbGciOiJIUzI1NiIs..."
        refreshToken:
          type: string
          description: "JWT refresh token, expires in 7 days"
          example: "eyJhbGciOiJIUzI1NiIs..."


    PaginationMeta:
      type: object
      properties:
        total: { type: integer, example: 50 }
        perPage: { type: integer, example: 10 }
        currentPage: { type: integer, example: 1 }
        lastPage: { type: integer, example: 5 }
        from: { type: integer, example: 1 }
        to: { type: integer, example: 10 }

    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        password: { type: string, minLength: 6, example: "secret123" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }
        isActive: { type: boolean, default: true, example: true }
        roleId: { type: integer, nullable: true, example: 1 }
        employeeId: { type: integer, nullable: true, example: 1 }

    UpdateUserRequest:
      type: object
      properties:
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        password: { type: string, minLength: 6, example: "newSecret123" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }
        isActive: { type: boolean, example: true }
        roleId: { type: integer, nullable: true, example: 1 }
        employeeId: { type: integer, nullable: true, example: 1 }

    UpdateProfileRequest:
      type: object
      required: [name, email]
      properties:
        name: { type: string, example: "Budi Santoso" }
        email: { type: string, format: email, example: "budi@example.com" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }

    UpdatePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        oldPassword: { type: string, example: "oldSecret123" }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    # --- Feedback Schemas ---
    StoreFeedbackRequest:
      type: object
      required: [message, type, "images[]"]
      properties:
        message:
          type: string
          description: Feedback message content
          example: "Button tidak berfungsi di halaman dashboard"
        type:
          type: string
          description: Feedback type/category
          example: "bug"
        url:
          type: string
          description: URL of the page where the issue occurred (optional)
          example: "https://simas.nusa.net.id/dashboard"
        "images[]":
          type: array
          items:
            type: string
            format: binary
          description: Screenshot images (1-5 files, image/* only)
          minItems: 1
          maxItems: 5

    FeedbackItem:
      type: object
      properties:
        timestamp:
          type: string
          example: "2026-06-18T10:30:00Z"
        userId:
          type: string
          example: "1"
        name:
          type: string
          example: "Budi Santoso"
        images:
          type: array
          items:
            type: string
            nullable: true
          example: ["https://cdn.example.com/feedback/1_123456_0.jpg"]
        url:
          type: string
          example: "https://simas.nusa.net.id/dashboard"
        category:
          type: string
          example: "bug"
        message:
          type: string
          example: "Button tidak berfungsi di halaman dashboard"
        type:
          type: string
          example: "bug"
        reply:
          type: string
          example: ""

    # --- Employee Schemas ---
    CreateEmployeeRequest:
      type: object
      required: [name, employeeId, jobPosition, email, phone]
      properties:
        name: { type: string, example: "Budi Santoso" }
        employeeId: { type: string, example: "EMP-001" }
        jobPosition: { type: string, example: "Software Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "employees/abc-123.png" }
        isActive: { type: boolean, default: true, example: true }

    UpdateEmployeeRequest:
      type: object
      properties:
        name: { type: string, example: "Budi Santoso" }
        employeeId: { type: string, example: "EMP-001" }
        jobPosition: { type: string, example: "Senior Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "employees/abc-123.png" }
        isActive: { type: boolean, example: true }

    EmployeeResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        employeeId: { type: string, example: "EMP-001" }
        name: { type: string, example: "Budi Santoso" }
        jobPosition: { type: string, example: "Software Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/employees/abc-123.png" }
        isActive: { type: boolean, example: true }
        assetCount: { type: integer, example: 3, description: "Number of assets currently held by this employee" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Category Schemas ---
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        code: { type: string, example: "CAT-001" }
        name: { type: string, example: "Electronics" }
        description: { type: string, nullable: true, example: "Electronic devices and accessories" }

    UpdateCategoryRequest:
      type: object
      properties:
        code: { type: string, example: "CAT-001" }
        name: { type: string, example: "Electronics" }
        description: { type: string, nullable: true, example: "Updated description" }

    CategoryResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "CAT-001" }
        name: { type: string, example: "Electronics" }
        description: { type: string, nullable: true, example: "Electronic devices and accessories" }
        assetCount: { type: integer, example: 12, description: "Total number of assets in this category" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- SubCategory Schemas ---
    CreateSubCategoryRequest:
      type: object
      required: [name, categoryId]
      properties:
        code: { type: string, example: "SC-001" }
        name: { type: string, example: "Laptops" }
        description: { type: string, nullable: true, example: "Laptop computers" }
        categoryId: { type: integer, example: 1 }

    UpdateSubCategoryRequest:
      type: object
      properties:
        code: { type: string, example: "SC-001" }
        name: { type: string, example: "Laptops" }
        description: { type: string, nullable: true, example: "Updated description" }
        categoryId: { type: integer, example: 1 }

    SubCategoryResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "SC-001" }
        name: { type: string, example: "Laptops" }
        description: { type: string, nullable: true, example: "Laptop computers" }
        category:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Electronics" }
        assetCount: { type: integer, example: 5, description: "Total number of assets in this sub-category" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Branch Schemas ---
    CreateBranchRequest:
      type: object
      required: [name]
      properties:
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Main branch in Jakarta" }
        address: { type: string, nullable: true, example: "Jl. Sudirman No. 1, Jakarta" }
        email: { type: string, format: email, nullable: true, example: "jakarta@company.com" }
        phone: { type: string, nullable: true, example: "021-1234567" }

    UpdateBranchRequest:
      type: object
      properties:
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Updated description" }
        address: { type: string, nullable: true, example: "Jl. Sudirman No. 1, Jakarta" }
        email: { type: string, format: email, nullable: true, example: "jakarta@company.com" }
        phone: { type: string, nullable: true, example: "021-1234567" }

    BranchResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Main branch in Jakarta" }
        address: { type: string, nullable: true, example: "Jl. Sudirman No. 1, Jakarta" }
        email: { type: string, format: email, nullable: true, example: "jakarta@company.com" }
        phone: { type: string, nullable: true, example: "021-1234567" }
        assetCount: { type: integer, example: 8, description: "Number of assets at this branch (based on last location)" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Location Schemas ---
    CreateLocationRequest:
      type: object
      required: [branchId, name]
      properties:
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Server and networking equipment room" }
        mistZoneId: { type: string, nullable: true, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }

    UpdateLocationRequest:
      type: object
      properties:
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Updated description" }
        mistZoneId: { type: string, nullable: true, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }

    LocationResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Server and networking equipment room" }
        mistZoneId: { type: string, nullable: true, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }
        branch:
          type: object
          properties:
            id: { type: integer, example: 1 }
            code: { type: string, example: "BR-001" }
            name: { type: string, example: "Jakarta Branch" }
        assetCount: { type: integer, example: 4, description: "Number of assets at this location (based on last location)" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Asset Schemas ---
    CreateAssetRequest:
      type: object
      required: [code, name, subCategoryId]
      properties:
        code: { type: string, example: "AST-001" }
        name: { type: string, example: "MacBook Pro M3" }
        description: { type: string, nullable: true, example: "Company laptop" }
        price: { type: integer, example: 20000000 }
        purchaseDate: { type: string, format: date, example: "2026-06-18" }
        brand: { type: string, example: "Apple" }
        model: { type: string, example: "A2941" }
        image: { type: string, nullable: true, example: "assets/macbook.png" }
        bleTagMac: { type: string, nullable: true, example: "aa:bb:cc:dd:ee:ff" }
        usefulLife: { type: integer, nullable: true, example: 5, description: "Useful life in years" }
        subCategoryId: { type: integer, example: 1 }
        hasHolder: { type: boolean, default: true, example: true }
        hasMaintenance: { type: boolean, default: true, example: true }
        hasLocation: { type: boolean, default: true, example: true }
        status: { type: string, enum: [active, idle, under_repair, damaged, lost, sold, disposed], example: "active", description: "Initial asset status" }
        statusNote: { type: string, nullable: true, example: "Asset is ready for use" }

    UpdateAssetRequest:
      type: object
      properties:
        code: { type: string, example: "AST-001" }
        name: { type: string, example: "MacBook Pro M3" }
        description: { type: string, nullable: true, example: "Company laptop" }
        price: { type: integer, example: 20000000 }
        purchaseDate: { type: string, format: date, example: "2026-06-18" }
        brand: { type: string, example: "Apple" }
        model: { type: string, example: "A2941" }
        image: { type: string, nullable: true, example: "assets/macbook.png" }
        bleTagMac: { type: string, nullable: true, example: "aa:bb:cc:dd:ee:ff" }
        usefulLife: { type: integer, nullable: true, example: 5, description: "Useful life in years" }
        subCategoryId: { type: integer, example: 1 }
        hasHolder: { type: boolean, example: true }
        hasMaintenance: { type: boolean, example: true }
        hasLocation: { type: boolean, example: true }

    BulkDeleteAssetRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: integer }
          minItems: 1
          example: [1, 2, 3]

    BulkDeleteAssetResponse:
      type: object
      properties:
        deleted: { type: integer, example: 2 }
        failed:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 3 }
              message: { type: string, example: "Cannot delete asset, it is currently assigned to an employee" }

    AssetResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "AST-001" }
        name: { type: string, example: "MacBook Pro M3" }
        description: { type: string, nullable: true, example: "Company laptop" }
        price: { type: integer, nullable: true, example: 20000000 }
        purchaseDate: { type: string, format: date, nullable: true, example: "2026-06-18" }
        brand: { type: string, nullable: true, example: "Apple" }
        model: { type: string, nullable: true, example: "A2941" }
        image: { type: string, nullable: true, example: "https://cdn.example.com/stock/assets/macbook.png" }
        rawImage: { type: string, nullable: true, example: "assets/macbook.png" }
        subCategoryId: { type: integer, example: 1 }
        hasHolder: { type: boolean, example: true }
        hasMaintenance: { type: boolean, example: true }
        hasLocation: { type: boolean, example: true }
        bleTagMac: { type: string, nullable: true, example: "aa:bb:cc:dd:ee:ff" }
        usefulLife: { type: integer, nullable: true, example: 5 }
        depreciation:
          type: object
          nullable: true
          properties:
            monthlyDepreciation: { type: number, example: 983.33 }
            accumulatedDepreciation: { type: number, example: 11799.96 }
            bookValue: { type: number, example: 47200.04 }
        subCategory:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Laptops" }
            category:
              type: object
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Electronics" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "https://cdn.example.com/stock/avatars/user1.png" }
        activeHolder:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            assignedDate: { type: string, format: date, example: "2026-06-19" }
            assignHandoverId: { type: integer, nullable: true, example: 5 }
            employee:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Alice Smith" }
                employeeId: { type: string, example: "EMP001" }
                jobPosition: { type: string, example: "Software Engineer" }
        lastLocation:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            date: { type: string, format: date, example: "2026-06-19" }
            location:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "IT Room" }
                branch:
                  type: object
                  nullable: true
                  properties:
                    id: { type: integer, example: 1 }
                    name: { type: string, example: "Medan Branch" }
        lastStatus:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            status: { type: string, example: "active" }
            note: { type: string, nullable: true, example: "Asset is ready for use" }
            createdAt: { type: string, format: date-time }
            createdBy:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Budi Santoso" }
                photo: { type: string, nullable: true, example: "http://cdn.test.com/stock/photos/user1.jpg" }

    AttachmentResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        originalName: { type: string, example: "report.pdf" }
        filename: { type: string, example: "attachments/xyz.pdf" }
        mimeType: { type: string, example: "application/pdf" }
        size: { type: integer, example: 1048576 }
        url: { type: string, example: "https://cdn.example.com/stock/attachments/xyz.pdf" }
        entityType: { type: string, nullable: true, example: "AssetMaintenance" }
        entityId: { type: integer, nullable: true, example: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateAssetMaintenanceRequest:
      type: object
      required: [assetId, date, note]
      properties:
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Routine hardware checkup" }
        cost: { type: number, nullable: true, example: 500000, description: "Expenditure amount (Rp)" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    UpdateAssetMaintenanceRequest:
      type: object
      properties:
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Routine hardware checkup" }
        cost: { type: number, nullable: true, example: 500000, description: "Expenditure amount (Rp)" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    AssetMaintenanceResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Routine hardware checkup" }
        cost: { type: number, nullable: true, example: 500000 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentResponse" }

    CreateAssetNoteRequest:
      type: object
      required: [assetId, date, note]
      properties:
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "General observation about the asset" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    UpdateAssetNoteRequest:
      type: object
      properties:
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "General observation about the asset" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    AssetNoteResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "General observation about the asset" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentResponse" }

    CreateAssetLocationRequest:
      type: object
      required: [assetId, locationId, date]
      properties:
        assetId: { type: integer, example: 1 }
        locationId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Relocated to Main Office IT Room" }

    # --- Book Schemas ---
    BorrowBookRequest:
      type: object
      required: [assetId]
      properties:
        assetId: { type: integer, example: 1, description: "ID of the book asset to borrow" }
        assignNote: { type: string, nullable: true, example: "Borrowing for reading club", description: "Optional note" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1]
          description: "Attachment IDs (e.g. borrow photo)"

    ReturnBookRequest:
      type: object
      required: [assetHolderId, returnNote]
      properties:
        assetHolderId: { type: integer, example: 1, description: "ID of the asset holder record" }
        returnNote: { type: string, format: uri, example: "https://www.goodreads.com/book/show/12345", description: "Goodreads link (required, must be a valid URL)" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [2]
          description: "Attachment IDs (e.g. return photo)"

    BookLoanGroup:
      type: object
      description: |
        Loans grouped by employee. Each key is an employee ID (string) mapping to the
        employee's name and a `bookLoans` map keyed by asset-holder record ID.
      additionalProperties:
        type: object
        properties:
          employee: { type: string, example: "Book Reader" }
          bookLoans:
            type: object
            additionalProperties: { $ref: "#/components/schemas/BookLoanItem" }

    BookLoanItem:
      type: object
      properties:
        code: { type: string, example: "BOOK-001" }
        name: { type: string, example: "Atomic Habits" }
        imageUrl: { type: string, nullable: true, example: "http://cdn.test.com/stock/attachments/cover.jpg" }
        subCategory: { type: string, nullable: true, example: "Novel" }
        loanHistory:
          type: object
          properties:
            loaning:
              type: object
              properties:
                loanPeriod: { type: string, nullable: true, example: "2026-07-07T10:00" }
                loanPhoto: { type: string, nullable: true, example: "http://cdn.test.com/stock/attachments/loan.jpg" }
            return:
              type: object
              properties:
                returnTime: { type: string, nullable: true, example: "2026-07-08T14:30" }
                returnPhoto: { type: string, nullable: true, example: "http://cdn.test.com/stock/attachments/return.jpg" }
                linkReview: { type: string, nullable: true, example: "https://www.goodreads.com/book/show/40121378" }

    AssetLocationResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, nullable: true, example: "Relocated to Main Office IT Room" }
        source: { type: string, example: "manual", description: "Source of the relocation: manual or ble" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        location:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "IT Room" }
            description: { type: string, nullable: true, example: "Server room, 2nd floor" }
            branch:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Medan Branch" }
                code: { type: string, example: "MDN" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }

    HandoverItemRequest:
      type: object
      required: [assetId]
      properties:
        assetId: { type: integer, example: 1 }
        note: { type: string, nullable: true, example: "Charger + bag, minor scratches", description: "Keterangan/kondisi per item — shown in the generated form" }

    HandoverFieldResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        transactionType: { type: string, enum: [assign, return] }
        label: { type: string, example: "PIC Name" }
        key: { type: string, example: "pic_name" }
        type: { type: string, enum: [text, number, select, radio] }
        options: { type: array, items: { type: string }, nullable: true }
        required: { type: boolean, example: true }
        sortOrder: { type: integer, example: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    InventoryResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, nullable: true, example: "PRD-001" }
        name: { type: string, example: "Kabel UTP Cat6" }
        description: { type: string, nullable: true }
        image: { type: string, nullable: true }
        unit: { type: string, example: "Roll" }
        isActive: { type: boolean, example: true }
        category:
          type: object
          nullable: true
          properties: { id: { type: integer }, name: { type: string } }
        subCategory:
          type: object
          nullable: true
          properties: { id: { type: integer }, name: { type: string } }
        labels:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              key: { type: string, example: "Brand" }
              value: { type: string, example: "Belden" }
        variantCount: { type: integer, description: "Number of variants (list only)", example: 3 }
        balanceCount: { type: integer, description: "Total on-hand stock quantity across all variants/branches (list only)", example: 42 }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentResponse" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            photo: { type: string, nullable: true }

    InventoryVariantResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        inventoryId: { type: integer, example: 1 }
        name: { type: string, example: "305m / Roll" }
        code: { type: string, nullable: true }
        unit: { type: string, example: "roll" }
        isActive: { type: boolean, example: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        inventory:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            code: { type: string, nullable: true }

    InventoryStockBalanceResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        condition: { type: string, enum: [new, used] }
        quantity: { type: integer, example: 12 }
        updatedAt: { type: string, format: date-time }
        branch:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
        variant:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            code: { type: string, nullable: true }
            unit: { type: string }
            inventory:
              type: object
              nullable: true
              properties:
                id: { type: integer }
                name: { type: string }
                code: { type: string, nullable: true }

    InventoryStockEntryTemplateResponse:
      type: object
      description: One row per variant with current on-hand new/used quantities for the selected branch.
      properties:
        variantId: { type: integer, example: 1 }
        name: { type: string }
        code: { type: string, nullable: true }
        unit: { type: string }
        new: { type: integer, example: 10 }
        used: { type: integer, example: 3 }

    InventoryStockMovementResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        type: { type: string, enum: [entry, adjustment, transfer_out, transfer_in] }
        condition: { type: string, enum: [new, used] }
        quantity: { type: integer, description: "Signed delta (negative for outgoing)", example: -3 }
        balanceAfter: { type: integer, nullable: true, example: 9 }
        referenceId: { type: string, nullable: true, description: "Groups both legs of a transfer", example: "TRF-1720000000000" }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        branch:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
        variant:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            inventory:
              type: object
              nullable: true
              properties:
                id: { type: integer }
                name: { type: string }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            photo: { type: string, nullable: true }

    InventoryStockTransferResponse:
      type: object
      description: "A stock transfer document between two branches."
      properties:
        id: { type: integer, example: 1 }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        fromBranch:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
        toBranch:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            photo: { type: string, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              condition: { type: string, enum: [new, used] }
              quantity: { type: integer }
              variant:
                type: object
                nullable: true
                properties:
                  id: { type: integer }
                  name: { type: string }
                  code: { type: string, nullable: true }
                  inventory:
                    type: object
                    nullable: true
                    properties:
                      id: { type: integer }
                      name: { type: string }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentResponse" }

    InventoryStockHoldingResponse:
      type: object
      description: "Quantity of a stock variant currently held by an employee."
      properties:
        id: { type: integer, example: 1 }
        conditionAssigned: { type: string, enum: [new, used] }
        quantity: { type: integer, example: 4, description: "Total assigned." }
        quantityReturned: { type: integer, example: 1 }
        quantityRemaining: { type: integer, example: 3, description: "Still held (quantity - quantityReturned)." }
        assignedDate: { type: string }
        returnedDate: { type: string, nullable: true }
        assignNote: { type: string, nullable: true }
        returnNote: { type: string, nullable: true }
        assignHandoverId: { type: integer, nullable: true }
        returnHandoverId: { type: integer, nullable: true }
        employee:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            employeeId: { type: string }
        branch:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
        variant:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            code: { type: string, nullable: true }
            unit: { type: string }
            inventory:
              type: object
              nullable: true
              properties:
                id: { type: integer }
                name: { type: string }
                code: { type: string, nullable: true }

    CreateHandoverRequest:
      type: object
      required: [receivedById, handedOverById, transactionType]
      description: "A handover carries either assets (itemKind=asset, use `items`) or stock (itemKind=stock, use `stockItems`)."
      properties:
        receivedById: { type: integer, example: 1, description: "Employee receiving (penerima)" }
        handedOverById: { type: integer, example: 2, description: "Employee handing over (penyerah)" }
        transactionType: { type: string, enum: [assign, return], example: "assign" }
        itemKind: { type: string, enum: [asset, stock], default: asset, description: "Whether this handover carries assets or stock." }
        note: { type: string, nullable: true, example: "Operational use" }
        customFields:
          type: object
          nullable: true
          additionalProperties: { type: string, nullable: true }
          description: "Values for configured custom fields, keyed by field key."
          example: { pic_name: "Budi", condition: "Good" }
        items:
          type: array
          description: "Asset lines — required when itemKind is asset."
          items: { $ref: "#/components/schemas/HandoverItemRequest" }
        stockItems:
          type: array
          description: "Stock lines — required when itemKind is stock."
          items:
            type: object
            required: [variantId, branchId, condition, quantity]
            properties:
              variantId: { type: integer, example: 1 }
              branchId: { type: integer, example: 1, description: "Source branch (assign) / destination branch (return)." }
              condition: { type: string, enum: [new, used] }
              quantity: { type: integer, minimum: 1, example: 4 }
              note: { type: string, nullable: true }

    HandoverResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        received:
          type: object
          nullable: true
          description: "Employee receiving the asset (penerima)"
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Alice Smith" }
            employeeId: { type: string, example: "EMP001" }
            jobPosition: { type: string, example: "Software Engineer" }
            photo: { type: string, nullable: true }
        handedOver:
          type: object
          nullable: true
          description: "Employee handing over the asset (penyerah)"
          properties:
            id: { type: integer, example: 2 }
            name: { type: string, example: "John Doe" }
            employeeId: { type: string, example: "EMP002" }
            jobPosition: { type: string, example: "IT Support" }
            photo: { type: string, nullable: true }
        status: { type: string, enum: [pending, approve, reject, cancel], example: "pending" }
        transactionType: { type: string, enum: [assign, return] }
        itemKind: { type: string, enum: [asset, stock], example: "asset" }
        note: { type: string, nullable: true }
        customFields:
          type: array
          description: "Snapshot of custom field definitions + values captured at creation time."
          items:
            type: object
            properties:
              key: { type: string, example: "pic_name" }
              label: { type: string, example: "PIC Name" }
              type: { type: string, enum: [text, number, select, radio] }
              value: { type: string, nullable: true, example: "Budi" }
        parentHandover:
          type: object
          nullable: true
          description: "For a return handover, the origin assign handover it returns from (best-effort)."
          properties:
            id: { type: integer, example: 5 }
            transactionType: { type: string, enum: [assign, return] }
            status: { type: string, enum: [pending, approve, reject, cancel] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Admin User" }
            photo: { type: string, nullable: true }
        attachments:
          type: array
          description: "Signing form PDF on create; replaced with the signed document URL after the e-sign webhook completes."
          items: { $ref: "#/components/schemas/AttachmentResponse" }
        items:
          type: array
          description: "Asset lines (present when itemKind is asset)."
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              note: { type: string, nullable: true, example: "Lengkap dengan charger" }
              asset:
                type: object
                nullable: true
                properties:
                  id: { type: integer, example: 1 }
                  name: { type: string, example: "MacBook Pro M3" }
                  code: { type: string, example: "AST-001" }
                  image: { type: string, nullable: true, example: "http://cdn.test.com/stock/assets/laptop.jpg" }
        stockItems:
          type: array
          description: "Stock lines (present when itemKind is stock)."
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              condition: { type: string, enum: [new, used] }
              quantity: { type: integer, example: 4 }
              note: { type: string, nullable: true }
              branch:
                type: object
                nullable: true
                properties:
                  id: { type: integer }
                  name: { type: string }
              variant:
                type: object
                nullable: true
                properties:
                  id: { type: integer }
                  name: { type: string }
                  code: { type: string, nullable: true }
                  unit: { type: string }
                  inventory:
                    type: object
                    nullable: true
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      code: { type: string, nullable: true }

    AssignAssetRequest:
      type: object
      required: [assetId, employeeId, assignedDate]
      properties:
        assetId: { type: integer, example: 1 }
        employeeId: { type: integer, example: 1 }
        assignedDate: { type: string, format: date, example: "2026-06-19" }
        assignNote: { type: string, example: "Assigned for development work" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    ReturnAssetRequest:
      type: object
      required: [returnedDate]
      properties:
        returnedDate: { type: string, format: date, example: "2026-06-25" }
        returnNote: { type: string, example: "Returned in good condition" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [3]

    AssetHolderResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assignedDate: { type: string, format: date, example: "2026-06-19" }
        returnedDate: { type: string, format: date, nullable: true, example: "2026-06-25" }
        assignNote: { type: string, nullable: true, example: "Assigned for development work" }
        returnNote: { type: string, nullable: true, example: "Returned in good condition" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        employee:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Alice Smith" }
            employeeId: { type: string, example: "EMP001" }
            jobPosition: { type: string, example: "Software Engineer" }
            email: { type: string, example: "alice@example.com" }
            phone: { type: string, example: "08123456789" }
            photo: { type: string, nullable: true, example: "employees/photo.png" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        returnedBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        assignHandover:
          type: object
          nullable: true
          description: "Origin (assign) handover if this holder was created from a handover; null otherwise."
          properties:
            id: { type: integer, example: 5 }
            status: { type: string, enum: [pending, approve, reject, cancel], example: "approve" }
            transactionType: { type: string, enum: [assign, return], example: "assign" }
            note: { type: string, nullable: true, example: "Operational use" }
            createdAt: { type: string, format: date-time }
        returnHandover:
          type: object
          nullable: true
          description: "Return handover that returned this holder; null while still active."
          properties:
            id: { type: integer, example: 8 }
            status: { type: string, enum: [pending, approve, reject, cancel], example: "approve" }
            transactionType: { type: string, enum: [assign, return], example: "return" }
            note: { type: string, nullable: true }
            createdAt: { type: string, format: date-time }
        attachments:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              originalName: { type: string, example: "hello.txt" }
              mimeType: { type: string, example: "text/plain" }
              size: { type: integer, example: 1234 }
              url: { type: string, example: "http://cdn.test.com/stock/hello.txt" }

    AssetLogResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        action: { type: string, example: "create" }
        description: { type: string, example: "Asset Dell Laptop was registered" }
        createdAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
            email: { type: string, example: "admin@example.com" }

    # --- Asset Status Schemas ---
    CreateAssetStatusRequest:
      type: object
      required: [assetId, status]
      properties:
        assetId: { type: integer, example: 1 }
        status: { type: string, enum: [active, idle, under_repair, damaged, lost, sold, disposed], example: "active" }
        note: { type: string, nullable: true, example: "Asset is operational" }
        returnActiveHolders: { type: boolean, default: false, description: "If true, automatically return the asset from its active holder" }

    BulkCreateAssetStatusRequest:
      type: object
      required: [assetIds, status]
      properties:
        assetIds:
          type: array
          items: { type: integer }
          minItems: 1
          example: [1, 2, 3]
          description: "Array of asset IDs to change status for"
        status: { type: string, enum: [active, idle, under_repair, damaged, lost, sold, disposed], example: "active" }
        note: { type: string, nullable: true, example: "Bulk status update" }
        returnActiveHolders: { type: boolean, default: false, description: "If true, automatically return assets from their active holders" }

    AssetStatusResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        status: { type: string, example: "active" }
        note: { type: string, nullable: true, example: "Asset is operational" }
        createdAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }

    # --- Role & Permission Schemas ---
    PermissionResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        key: { type: string, example: "asset:read" }
        module: { type: string, example: "asset" }
        action: { type: string, example: "read" }

    CreateRoleRequest:
      type: object
      required: [name, permissionIds]
      properties:
        name: { type: string, example: "Admin" }
        permissionIds:
          type: array
          items: { type: integer }
          example: [1, 2, 3, 4, 5]

    UpdateRoleRequest:
      type: object
      properties:
        name: { type: string, example: "Admin" }
        permissionIds:
          type: array
          items: { type: integer }
          example: [1, 2, 3]

    RoleResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Admin" }
        isSuperAdmin: { type: boolean, example: false }
        permissions:
          type: array
          items: { $ref: "#/components/schemas/PermissionResponse" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

paths:
  # ── Register ──────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
