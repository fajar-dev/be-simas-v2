          in: query
          description: "Filter by status (true = active, false = inactive, or 1/0)"
          schema: { type: string }
        - name: sortBy
          in: query
          description: Field to sort by
          schema: { type: string, enum: [name, email, isActive, createdAt] }
        - name: order
          in: query
          description: Sort order
          schema: { type: string, enum: [ASC, DESC], default: DESC }
