        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10 }
        - name: assetId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Asset status history retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AssetStatusResponse" }
        "401": { description: Unauthorized }
    post:
      tags: [Asset Status]
      summary: Create a new asset status
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAssetStatusRequest" }
      responses:
        "201":
          description: Asset status created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AssetStatusResponse" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Asset Status Bulk ────────────────────────────────────────────────────
  /asset-status/bulk:
    post:
      tags: [Asset Status]
      summary: Bulk update asset statuses
      description: "Change the status of multiple assets at once. Creates a new status record for each asset. Optionally auto-returns assets from active holders when returnActiveHolders is true."
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkCreateAssetStatusRequest" }
      responses:
        "201":
          description: Asset statuses updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count: { type: integer, example: 3, description: "Number of assets whose status was changed" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Proxy MinIO ─────────────────────────────────────────────────────────
  /proxy:
    get:
      tags: [Upload]
      summary: Proxy a file from MinIO storage
      description: "Streams a file from MinIO object storage."
      parameters:
        - name: path
          in: query
          required: true
          description: MinIO object path
          schema: { type: string, example: "users/abc-123.png" }
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400": { description: "Missing 'path' query parameter" }

  # ── Mist BLE Webhook ────────────────────────────────────────────────────
  /webhook/mist:
    post:
      tags: [Webhook]
      summary: Receive Mist BLE zone events
      description: |
        Webhook endpoint for Juniper Mist to send BLE zone events.
        When an asset's BLE tag enters a mapped zone, an asset_location record is automatically created.
        Authentication is via X-Mist-Secret header or secret query parameter (not JWT).
      parameters:
        - name: X-Mist-Secret
          in: header
          required: false
          description: Webhook secret for authentication
          schema: { type: string }
        - name: secret
          in: query
          required: false
          description: Alternative webhook secret via query parameter
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic: { type: string, example: "zone", description: "Event topic from Mist" }
                events:
                  type: array
                  items:
                    type: object
                    properties:
                      site_id: { type: string, example: "a1b2c3d4-5678-9abc-def0-123456789abc" }
                      zone_id: { type: string, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }
                      mac: { type: string, example: "aa:bb:cc:dd:ee:ff" }
                      type: { type: string, enum: [enter, exit], example: "enter" }
                      timestamp: { type: integer, example: 1719330000 }
                      name: { type: string, example: "Server Room" }
      responses:
        "200":
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          processed: { type: integer, example: 1 }
                          results:
                            type: array
                            items:
                              type: object
                              properties:
                                mac: { type: string, example: "aa:bb:cc:dd:ee:ff" }
                                status: { type: string, enum: [relocated, skipped, asset_not_found, zone_not_mapped, already_at_location, location_disabled, error], example: "relocated" }
                                assetId: { type: integer, example: 1 }
                                locationId: { type: integer, example: 1 }
        "401": { description: "Invalid webhook secret" }

  /webhook/esign:
    post:
      tags: [Webhook]
      summary: E-sign signing callback (public)
      description: >
        Called by the e-sign provider when a handover document reaches a final state.
        `status = COMPLETED` approves the handover referenced by `external_reference_id`
        (auto-assigns a holder per item, swaps the handover attachment to the signed
        `file_url`, and attaches the signed document to each holder). Any other status
        rejects the handover. No JWT required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_reference_id, status]
              properties:
                external_reference_id: { type: string, example: "42", description: "The handover ID passed at submission time" }
                status: { type: string, example: "COMPLETED", description: "COMPLETED approves; any other value rejects" }
                file_url: { type: string, nullable: true, example: "https://esign.example/documents/signed.pdf", description: "URL of the signed document (present on COMPLETED)" }
                document_id: { type: string, nullable: true, example: "01kx0sv40tzgcc80vm89tn3mjy" }
                completed_at: { type: string, nullable: true, example: "2026-07-08T19:05:48+07:00" }
                uploader_name: { type: string, nullable: true, example: "Oskar Hutasoit" }
      responses:
        "200":
          description: Esign webhook handled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          handover: { $ref: "#/components/schemas/HandoverResponse" }
                          attachments:
                            type: array
                            items: { $ref: "#/components/schemas/AttachmentResponse" }
        "400": { description: "Invalid external reference ID, or handover cannot transition (e.g. not pending)" }

  # ── AI ──────────────────────────────────────────────────────────────────────
  /ai/decode-barcode:
    post:
      tags: [AI]
      summary: Decode barcode/QR code from image
      description: |
        Upload an image containing a barcode or QR code. The AI (Gemini) will analyze
        the image and return the decoded content. Returns 400 if no code is found or
        the image is too blurry.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: "Image file containing a barcode or QR code (max 10MB, image/* only)"
      responses:
        "200":
          description: Successfully decoded barcode/QR code
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          type:
                            type: string
                            enum: [barcode, qrcode]
                            example: "barcode"
                            description: "Type of code detected"
                          content:
                            type: string
                            example: "AST-001"
                            description: "Decoded content from the barcode/QR code"
        "400":
          description: "Bad request — no code found, image unclear, or invalid file"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      success: { type: boolean, example: false }
                      statusCode: { type: integer, example: 400 }
                      message:
                        type: string
                        example: "No barcode or QR code found in the image"
        "401": { description: "Unauthorized — missing or invalid token" }

