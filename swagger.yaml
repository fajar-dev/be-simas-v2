                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [User]
      summary: Create a new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
