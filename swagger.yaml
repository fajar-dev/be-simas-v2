openapi: 3.0.0
info:
  title: SIMAS API
  description: API Documentation for SIMAS Backend (Sistem Management Asset) — Authentication, User, and Asset management.
  version: 2.0.0
servers:
  - url: http://localhost:4000/api
    description: Local development server
  - url: /api
    description: Relative API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Expires in 15 minutes."

  schemas:
    # --- Base Wrapper Schemas ---
    BaseResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        statusCode: { type: integer, example: 200 }
        message: { type: string, example: "Operation successful" }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer, example: 422 }
        message: { type: string, example: "Validation failed" }
        errors:
          type: object
          example:
            email: "Invalid email format"
            password: "Password must be at least 6 characters"

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "Budi Santoso" }
        email: { type: string, format: email, example: "budi@example.com" }
        password: { type: string, minLength: 6, example: "secret123" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "budi@example.com" }
        password: { type: string, example: "secret123" }

    GoogleLoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, example: "4/0AX4XfWh..." }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, example: "budi@example.com" }

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string, example: "a3f8c2d1e9b4..." }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }

    # --- User Schema ---
    AuthUser:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Budi Santoso" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/photo.jpg" }
        email: { type: string, format: email, example: "budi@example.com" }
        isActive: { type: boolean, example: true }
        role:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Super Admin" }
            isSuperAdmin: { type: boolean, example: true }
            permissions:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer, example: 1 }
                  key: { type: string, example: "asset:read" }

    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/AuthUser" }
        accessToken:
          type: string
          description: "JWT access token, expires in 15 minutes"
          example: "eyJhbGciOiJIUzI1NiIs..."
        refreshToken:
          type: string
          description: "JWT refresh token, expires in 7 days"
          example: "eyJhbGciOiJIUzI1NiIs..."


    PaginationMeta:
      type: object
      properties:
        total: { type: integer, example: 50 }
        perPage: { type: integer, example: 10 }
        currentPage: { type: integer, example: 1 }
        lastPage: { type: integer, example: 5 }
        from: { type: integer, example: 1 }
        to: { type: integer, example: 10 }

    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        password: { type: string, minLength: 6, example: "secret123" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }
        isActive: { type: boolean, default: true, example: true }
        roleId: { type: integer, nullable: true, example: 1 }
        employeeId: { type: integer, nullable: true, example: 1 }

    UpdateUserRequest:
      type: object
      properties:
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        password: { type: string, minLength: 6, example: "newSecret123" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }
        isActive: { type: boolean, example: true }
        roleId: { type: integer, nullable: true, example: 1 }
        employeeId: { type: integer, nullable: true, example: 1 }

    UpdateProfileRequest:
      type: object
      required: [name, email]
      properties:
        name: { type: string, example: "Budi Santoso" }
        email: { type: string, format: email, example: "budi@example.com" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }

    UpdatePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        oldPassword: { type: string, example: "oldSecret123" }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    # --- Feedback Schemas ---
    StoreFeedbackRequest:
      type: object
      required: [message, type, "images[]"]
      properties:
        message:
          type: string
          description: Feedback message content
          example: "Button tidak berfungsi di halaman dashboard"
        type:
          type: string
          description: Feedback type/category
          example: "bug"
        url:
          type: string
          description: URL of the page where the issue occurred (optional)
          example: "https://simas.nusa.net.id/dashboard"
        "images[]":
          type: array
          items:
            type: string
            format: binary
          description: Screenshot images (1-5 files, image/* only)
          minItems: 1
          maxItems: 5

    FeedbackItem:
      type: object
      properties:
        timestamp:
          type: string
          example: "2026-06-18T10:30:00Z"
        userId:
          type: string
          example: "1"
        name:
          type: string
          example: "Budi Santoso"
        images:
          type: array
          items:
            type: string
            nullable: true
          example: ["https://cdn.example.com/feedback/1_123456_0.jpg"]
        url:
          type: string
          example: "https://simas.nusa.net.id/dashboard"
        category:
          type: string
          example: "bug"
        message:
          type: string
          example: "Button tidak berfungsi di halaman dashboard"
        type:
          type: string
          example: "bug"
        reply:
          type: string
          example: ""

    # --- Employee Schemas ---
    CreateEmployeeRequest:
      type: object
      required: [name, employeeId, jobPosition, email, phone]
      properties:
        name: { type: string, example: "Budi Santoso" }
        employeeId: { type: string, example: "EMP-001" }
        jobPosition: { type: string, example: "Software Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "employees/abc-123.png" }
        isActive: { type: boolean, default: true, example: true }

    UpdateEmployeeRequest:
      type: object
      properties:
        name: { type: string, example: "Budi Santoso" }
        employeeId: { type: string, example: "EMP-001" }
        jobPosition: { type: string, example: "Senior Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "employees/abc-123.png" }
        isActive: { type: boolean, example: true }

    EmployeeResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        employeeId: { type: string, example: "EMP-001" }
        name: { type: string, example: "Budi Santoso" }
        jobPosition: { type: string, example: "Software Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/employees/abc-123.png" }
        isActive: { type: boolean, example: true }
        assetCount: { type: integer, example: 3, description: "Number of assets currently held by this employee" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Category Schemas ---
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        code: { type: string, example: "CAT-001" }
        name: { type: string, example: "Electronics" }
        description: { type: string, nullable: true, example: "Electronic devices and accessories" }

    UpdateCategoryRequest:
      type: object
      properties:
        code: { type: string, example: "CAT-001" }
        name: { type: string, example: "Electronics" }
        description: { type: string, nullable: true, example: "Updated description" }

    CategoryResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "CAT-001" }
        name: { type: string, example: "Electronics" }
        description: { type: string, nullable: true, example: "Electronic devices and accessories" }
        assetCount: { type: integer, example: 12, description: "Total number of assets in this category" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- SubCategory Schemas ---
    CreateSubCategoryRequest:
      type: object
      required: [name, categoryId]
      properties:
        code: { type: string, example: "SC-001" }
        name: { type: string, example: "Laptops" }
        description: { type: string, nullable: true, example: "Laptop computers" }
        categoryId: { type: integer, example: 1 }

    UpdateSubCategoryRequest:
      type: object
      properties:
        code: { type: string, example: "SC-001" }
        name: { type: string, example: "Laptops" }
        description: { type: string, nullable: true, example: "Updated description" }
        categoryId: { type: integer, example: 1 }

    SubCategoryResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "SC-001" }
        name: { type: string, example: "Laptops" }
        description: { type: string, nullable: true, example: "Laptop computers" }
        category:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Electronics" }
        assetCount: { type: integer, example: 5, description: "Total number of assets in this sub-category" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Branch Schemas ---
    CreateBranchRequest:
      type: object
      required: [name]
      properties:
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Main branch in Jakarta" }
        address: { type: string, nullable: true, example: "Jl. Sudirman No. 1, Jakarta" }
        email: { type: string, format: email, nullable: true, example: "jakarta@company.com" }
        phone: { type: string, nullable: true, example: "021-1234567" }

    UpdateBranchRequest:
      type: object
      properties:
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Updated description" }
        address: { type: string, nullable: true, example: "Jl. Sudirman No. 1, Jakarta" }
        email: { type: string, format: email, nullable: true, example: "jakarta@company.com" }
        phone: { type: string, nullable: true, example: "021-1234567" }

    BranchResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Main branch in Jakarta" }
        address: { type: string, nullable: true, example: "Jl. Sudirman No. 1, Jakarta" }
        email: { type: string, format: email, nullable: true, example: "jakarta@company.com" }
        phone: { type: string, nullable: true, example: "021-1234567" }
        assetCount: { type: integer, example: 8, description: "Number of assets at this branch (based on last location)" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Location Schemas ---
    CreateLocationRequest:
      type: object
      required: [branchId, name]
      properties:
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Server and networking equipment room" }
        mistZoneId: { type: string, nullable: true, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }

    UpdateLocationRequest:
      type: object
      properties:
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Updated description" }
        mistZoneId: { type: string, nullable: true, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }

    LocationResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Server and networking equipment room" }
        mistZoneId: { type: string, nullable: true, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }
        branch:
          type: object
          properties:
            id: { type: integer, example: 1 }
            code: { type: string, example: "BR-001" }
            name: { type: string, example: "Jakarta Branch" }
        assetCount: { type: integer, example: 4, description: "Number of assets at this location (based on last location)" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Asset Schemas ---
    CreateAssetRequest:
      type: object
      required: [code, name, subCategoryId]
      properties:
        code: { type: string, example: "AST-001" }
        name: { type: string, example: "MacBook Pro M3" }
        description: { type: string, nullable: true, example: "Company laptop" }
        price: { type: integer, example: 20000000 }
        purchaseDate: { type: string, format: date, example: "2026-06-18" }
        brand: { type: string, example: "Apple" }
        model: { type: string, example: "A2941" }
        image: { type: string, nullable: true, example: "assets/macbook.png" }
        bleTagMac: { type: string, nullable: true, example: "aa:bb:cc:dd:ee:ff" }
        usefulLife: { type: integer, nullable: true, example: 5, description: "Useful life in years" }
        subCategoryId: { type: integer, example: 1 }
        hasHolder: { type: boolean, default: true, example: true }
        hasMaintenance: { type: boolean, default: true, example: true }
        hasLocation: { type: boolean, default: true, example: true }
        status: { type: string, enum: [active, idle, under_repair, damaged, lost, sold, disposed], example: "active", description: "Initial asset status" }
        statusNote: { type: string, nullable: true, example: "Asset is ready for use" }

    UpdateAssetRequest:
      type: object
      properties:
        code: { type: string, example: "AST-001" }
        name: { type: string, example: "MacBook Pro M3" }
        description: { type: string, nullable: true, example: "Company laptop" }
        price: { type: integer, example: 20000000 }
        purchaseDate: { type: string, format: date, example: "2026-06-18" }
        brand: { type: string, example: "Apple" }
        model: { type: string, example: "A2941" }
        image: { type: string, nullable: true, example: "assets/macbook.png" }
        bleTagMac: { type: string, nullable: true, example: "aa:bb:cc:dd:ee:ff" }
        usefulLife: { type: integer, nullable: true, example: 5, description: "Useful life in years" }
        subCategoryId: { type: integer, example: 1 }
        hasHolder: { type: boolean, example: true }
        hasMaintenance: { type: boolean, example: true }
        hasLocation: { type: boolean, example: true }

    BulkDeleteAssetRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: integer }
          minItems: 1
          example: [1, 2, 3]

    BulkDeleteAssetResponse:
      type: object
      properties:
        deleted: { type: integer, example: 2 }
        failed:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 3 }
              message: { type: string, example: "Cannot delete asset, it is currently assigned to an employee" }

    AssetResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "AST-001" }
        name: { type: string, example: "MacBook Pro M3" }
        description: { type: string, nullable: true, example: "Company laptop" }
        price: { type: integer, nullable: true, example: 20000000 }
        purchaseDate: { type: string, format: date, nullable: true, example: "2026-06-18" }
        brand: { type: string, nullable: true, example: "Apple" }
        model: { type: string, nullable: true, example: "A2941" }
        image: { type: string, nullable: true, example: "https://cdn.example.com/stock/assets/macbook.png" }
        rawImage: { type: string, nullable: true, example: "assets/macbook.png" }
        subCategoryId: { type: integer, example: 1 }
        hasHolder: { type: boolean, example: true }
        hasMaintenance: { type: boolean, example: true }
        hasLocation: { type: boolean, example: true }
        bleTagMac: { type: string, nullable: true, example: "aa:bb:cc:dd:ee:ff" }
        usefulLife: { type: integer, nullable: true, example: 5 }
        depreciation:
          type: object
          nullable: true
          properties:
            monthlyDepreciation: { type: number, example: 983.33 }
            accumulatedDepreciation: { type: number, example: 11799.96 }
            bookValue: { type: number, example: 47200.04 }
        subCategory:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Laptops" }
            category:
              type: object
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Electronics" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "https://cdn.example.com/stock/avatars/user1.png" }
        activeHolder:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            employeeId: { type: integer, example: 1 }
            assignedDate: { type: string, format: date, example: "2026-06-19" }
            employee:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Alice Smith" }
                employeeId: { type: string, example: "EMP001" }
                jobPosition: { type: string, example: "Software Engineer" }
        lastLocation:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            date: { type: string, format: date, example: "2026-06-19" }
            location:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "IT Room" }
                branch:
                  type: object
                  nullable: true
                  properties:
                    id: { type: integer, example: 1 }
                    name: { type: string, example: "Medan Branch" }
        lastStatus:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            status: { type: string, example: "active" }
            note: { type: string, nullable: true, example: "Asset is ready for use" }
            createdAt: { type: string, format: date-time }
            createdBy:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Budi Santoso" }
                photo: { type: string, nullable: true, example: "http://cdn.test.com/stock/photos/user1.jpg" }

    AttachmentResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        originalName: { type: string, example: "report.pdf" }
        filename: { type: string, example: "attachments/xyz.pdf" }
        mimeType: { type: string, example: "application/pdf" }
        size: { type: integer, example: 1048576 }
        url: { type: string, example: "https://cdn.example.com/stock/attachments/xyz.pdf" }
        entityType: { type: string, nullable: true, example: "AssetMaintenance" }
        entityId: { type: integer, nullable: true, example: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateAssetMaintenanceRequest:
      type: object
      required: [assetId, date, note]
      properties:
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Routine hardware checkup" }
        cost: { type: number, nullable: true, example: 500000, description: "Expenditure amount (Rp)" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    UpdateAssetMaintenanceRequest:
      type: object
      properties:
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Routine hardware checkup" }
        cost: { type: number, nullable: true, example: 500000, description: "Expenditure amount (Rp)" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    AssetMaintenanceResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Routine hardware checkup" }
        cost: { type: number, nullable: true, example: 500000 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentResponse" }

    CreateAssetLocationRequest:
      type: object
      required: [assetId, locationId, date]
      properties:
        assetId: { type: integer, example: 1 }
        locationId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, example: "Relocated to Main Office IT Room" }

    AssetLocationResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        locationId: { type: integer, example: 1 }
        date: { type: string, format: date, example: "2026-06-19" }
        note: { type: string, nullable: true, example: "Relocated to Main Office IT Room" }
        source: { type: string, example: "manual", description: "Source of the relocation: manual or ble" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        location:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "IT Room" }
            description: { type: string, nullable: true, example: "Server room, 2nd floor" }
            branch:
              type: object
              nullable: true
              properties:
                id: { type: integer, example: 1 }
                name: { type: string, example: "Medan Branch" }
                code: { type: string, example: "MDN" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }

    AssignAssetRequest:
      type: object
      required: [assetId, employeeId, assignedDate]
      properties:
        assetId: { type: integer, example: 1 }
        employeeId: { type: integer, example: 1 }
        assignedDate: { type: string, format: date, example: "2026-06-19" }
        assignNote: { type: string, example: "Assigned for development work" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [1, 2]

    ReturnAssetRequest:
      type: object
      required: [returnedDate]
      properties:
        returnedDate: { type: string, format: date, example: "2026-06-25" }
        returnNote: { type: string, example: "Returned in good condition" }
        attachmentIds:
          type: array
          items: { type: integer }
          example: [3]

    AssetHolderResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        employeeId: { type: integer, example: 1 }
        assignedDate: { type: string, format: date, example: "2026-06-19" }
        returnedDate: { type: string, format: date, nullable: true, example: "2026-06-25" }
        assignNote: { type: string, nullable: true, example: "Assigned for development work" }
        returnNote: { type: string, nullable: true, example: "Returned in good condition" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        asset:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "MacBook Pro M3" }
            code: { type: string, example: "AST-001" }
        employee:
          type: object
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "Alice Smith" }
            employeeId: { type: string, example: "EMP001" }
            jobPosition: { type: string, example: "Software Engineer" }
            email: { type: string, example: "alice@example.com" }
            phone: { type: string, example: "08123456789" }
            photo: { type: string, nullable: true, example: "employees/photo.png" }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        returnedBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
        attachments:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, example: 1 }
              originalName: { type: string, example: "hello.txt" }
              mimeType: { type: string, example: "text/plain" }
              size: { type: integer, example: 1234 }
              url: { type: string, example: "http://cdn.test.com/stock/hello.txt" }

    AssetLogResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        action: { type: string, example: "create" }
        description: { type: string, example: "Asset Dell Laptop was registered" }
        createdAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }
            email: { type: string, example: "admin@example.com" }

    # --- Asset Status Schemas ---
    CreateAssetStatusRequest:
      type: object
      required: [assetId, status]
      properties:
        assetId: { type: integer, example: 1 }
        status: { type: string, enum: [active, idle, under_repair, damaged, lost, sold, disposed], example: "active" }
        note: { type: string, nullable: true, example: "Asset is operational" }

    BulkCreateAssetStatusRequest:
      type: object
      required: [assetIds, status]
      properties:
        assetIds:
          type: array
          items: { type: integer }
          minItems: 1
          example: [1, 2, 3]
          description: "Array of asset IDs to change status for"
        status: { type: string, enum: [active, idle, under_repair, damaged, lost, sold, disposed], example: "active" }
        note: { type: string, nullable: true, example: "Bulk status update" }

    AssetStatusResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        assetId: { type: integer, example: 1 }
        status: { type: string, example: "active" }
        note: { type: string, nullable: true, example: "Asset is operational" }
        createdAt: { type: string, format: date-time }
        createdBy:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 1 }
            name: { type: string, example: "John Doe" }
            photo: { type: string, nullable: true, example: "users/avatar.png" }

    # --- Role & Permission Schemas ---
    PermissionResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        key: { type: string, example: "asset:read" }
        module: { type: string, example: "asset" }
        action: { type: string, example: "read" }

    CreateRoleRequest:
      type: object
      required: [name, permissionIds]
      properties:
        name: { type: string, example: "Admin" }
        permissionIds:
          type: array
          items: { type: integer }
          example: [1, 2, 3, 4, 5]

    UpdateRoleRequest:
      type: object
      properties:
        name: { type: string, example: "Admin" }
        permissionIds:
          type: array
          items: { type: integer }
          example: [1, 2, 3]

    RoleResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Admin" }
        isSuperAdmin: { type: boolean, example: false }
        permissions:
          type: array
          items: { $ref: "#/components/schemas/PermissionResponse" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

paths:
  # ── Register ──────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "422": { description: Validation error, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationError" } } } }

  # ── Login ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
        "401": { description: Invalid credentials }
        "422": { description: Validation error }

  # ── Google Login ──────────────────────────────────────────────────────────
  /auth/google:
    post:
      tags: [Auth]
      summary: Login with Google OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
        "400": { description: User not registered or account inactive }

  # ── Forgot Password ──────────────────────────────────────────────────────
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordRequest" }
      responses:
        "200":
          description: Password reset instructions sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Email not found or account inactive }

  # ── Validate Reset Token ─────────────────────────────────────────────────
  /auth/validate-reset-token:
    get:
      tags: [Auth]
      summary: Validate a password reset token
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Invalid or expired reset token }

  # ── Reset Password ──────────────────────────────────────────────────────
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Invalid or expired reset token }

  # ── Refresh Token ────────────────────────────────────────────────────────
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
        "401": { description: Invalid or expired refresh token }

  # ── Me ───────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "401": { description: Unauthorized }

  /auth/profile:
    put:
      tags: [Auth]
      summary: Update current user's profile details
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileRequest" }
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  /auth/password:
    put:
      tags: [Auth]
      summary: Update current user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePasswordRequest" }
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Invalid old password / Old password required }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Logout ───────────────────────────────────────────────────────────────
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "401": { description: Unauthorized }

  # ── User List ────────────────────────────────────────────────────────────
  /user:
    get:
      tags: [User]
      summary: Get all users (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: Search by name or email
          schema: { type: string }
        - name: isActive
          in: query
          description: "Filter by status (true = active, false = inactive, or 1/0)"
          schema: { type: string }
        - name: sortBy
          in: query
          description: Field to sort by
          schema: { type: string, enum: [name, email, isActive, createdAt] }
        - name: order
          in: query
          description: Sort order
          schema: { type: string, enum: [ASC, DESC], default: DESC }
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AuthUser" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [User]
      summary: Create a new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── User Detail / Update / Delete ────────────────────────────────────────
  /user/{id}:
    get:
      tags: [User]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "401": { description: Unauthorized }
        "404": { description: User not found }

    put:
      tags: [User]
      summary: Update a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "404": { description: User not found }
        "422": { description: Validation error }

    delete:
      tags: [User]
      summary: Delete a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "401": { description: Unauthorized }
        "404": { description: User not found }

  # ── Feedback List ──────────────────────────────────────────────────────────
  /feedback:
    get:
      tags: [Feedback]
      summary: Get feedback list for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feedback retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/FeedbackItem" }
        "401": { description: Unauthorized }

    post:
      tags: [Feedback]
      summary: Submit new feedback with screenshots
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/StoreFeedbackRequest" }
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: "null"
                        example: null
        "401": { description: Unauthorized }
        "422": { description: Validation error, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationError" } } } }

  # ── Category List (no pagination) ──────────────────────────────────────────
  /category/list:
    get:
      tags: [Category]
      summary: Get all categories (no pagination, for dropdowns)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer, example: 1 }
                            name: { type: string, example: "Electronics" }
        "401": { description: Unauthorized }

  # ── Category List / Create ──────────────────────────────────────────────────
  /category:
    get:
      tags: [Category]
      summary: Get all categories (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: Search by name, code, or description
          schema: { type: string }
        - name: sortBy
          in: query
          description: Field to sort by
          schema: { type: string, enum: [code, name, description, assetCount] }
        - name: order
          in: query
          description: Sort order
          schema: { type: string, enum: [ASC, DESC], default: DESC }
      responses:
        "200":
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/CategoryResponse" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [Category]
      summary: Create a new category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCategoryRequest" }
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CategoryResponse" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Category Detail / Update / Delete ────────────────────────────────────
  /category/{id}:
    get:
      tags: [Category]
      summary: Get category by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CategoryResponse" }
        "401": { description: Unauthorized }
        "404": { description: Category not found }

    put:
      tags: [Category]
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCategoryRequest" }
      responses:
        "200":
          description: Category updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CategoryResponse" }
        "401": { description: Unauthorized }
        "404": { description: Category not found }
        "422": { description: Validation error }

    delete:
      tags: [Category]
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Category deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "401": { description: Unauthorized }
        "404": { description: Category not found }
        "409":
          description: Cannot delete - has linked sub-categories

  # ── Sub-Category List / Create ──────────────────────────────────────────────
  /sub-category:
    get:
      tags: [Sub-Category]
      summary: Get all sub-categories (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: Search by name, code, or description
          schema: { type: string }
        - name: categoryId
          in: query
          description: Filter by category ID
          schema: { type: integer }
        - name: sortBy
          in: query
          description: Field to sort by
          schema: { type: string, enum: [code, name, description, category, assetCount] }
        - name: order
          in: query
          description: Sort order
          schema: { type: string, enum: [ASC, DESC], default: DESC }
      responses:
        "200":
          description: Sub-categories retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/SubCategoryResponse" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [Sub-Category]
      summary: Create a new sub-category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSubCategoryRequest" }
      responses:
        "201":
          description: Sub-category created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SubCategoryResponse" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Sub-Category by Category ─────────────────────────────────────────────
  /sub-category/by-category/{categoryId}:
    get:
      tags: [Sub-Category]
      summary: Get sub-categories by category ID (for dropdowns)
      security:
        - bearerAuth: []
      parameters:
        - name: categoryId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Sub-categories retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/SubCategoryResponse" }
        "401": { description: Unauthorized }

  # ── Sub-Category Detail / Update / Delete ────────────────────────────────
  /sub-category/{id}:
    get:
      tags: [Sub-Category]
      summary: Get sub-category by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Sub-category retrieved successfully
          content:
            application/json:
