openapi: 3.0.0
info:
  title: SIMAS API
  description: API Documentation for SIMAS Backend (Sistem Management Asset) — Authentication, User, and Asset management.
  version: 2.0.0
servers:
  - url: http://localhost:4000/api
    description: Local development server
  - url: /api
    description: Relative API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Expires in 15 minutes."

  schemas:
    # --- Base Wrapper Schemas ---
    BaseResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        statusCode: { type: integer, example: 200 }
        message: { type: string, example: "Operation successful" }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer, example: 422 }
        message: { type: string, example: "Validation failed" }
        errors:
          type: object
          example:
            email: "Invalid email format"
            password: "Password must be at least 6 characters"

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "Budi Santoso" }
        email: { type: string, format: email, example: "budi@example.com" }
        password: { type: string, minLength: 6, example: "secret123" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "budi@example.com" }
        password: { type: string, example: "secret123" }

    GoogleLoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string, example: "4/0AX4XfWh..." }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, example: "budi@example.com" }

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string, example: "a3f8c2d1e9b4..." }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }

    # --- User Schema ---
    AuthUser:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: "Budi Santoso" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/photo.jpg" }
        email: { type: string, format: email, example: "budi@example.com" }
        isActive: { type: boolean, example: true }

    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/AuthUser" }
        accessToken:
          type: string
          description: "JWT access token, expires in 15 minutes"
          example: "eyJhbGciOiJIUzI1NiIs..."
        refreshToken:
          type: string
          description: "JWT refresh token, expires in 7 days"
          example: "eyJhbGciOiJIUzI1NiIs..."


    PaginationMeta:
      type: object
      properties:
        total: { type: integer, example: 50 }
        perPage: { type: integer, example: 10 }
        currentPage: { type: integer, example: 1 }
        lastPage: { type: integer, example: 5 }
        from: { type: integer, example: 1 }
        to: { type: integer, example: 10 }

    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        password: { type: string, minLength: 6, example: "secret123" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }
        isActive: { type: boolean, default: true, example: true }

    UpdateUserRequest:
      type: object
      properties:
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        password: { type: string, minLength: 6, example: "newSecret123" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }
        isActive: { type: boolean, example: true }

    UpdateProfileRequest:
      type: object
      required: [name, email]
      properties:
        name: { type: string, example: "Budi Santoso" }
        email: { type: string, format: email, example: "budi@example.com" }
        photo: { type: string, nullable: true, example: "users/abc-123.png" }

    UpdatePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        oldPassword: { type: string, example: "oldSecret123" }
        newPassword: { type: string, minLength: 6, example: "newSecret123" }

    # --- Feedback Schemas ---
    StoreFeedbackRequest:
      type: object
      required: [message, type, "images[]"]
      properties:
        message:
          type: string
          description: Feedback message content
          example: "Button tidak berfungsi di halaman dashboard"
        type:
          type: string
          description: Feedback type/category
          example: "bug"
        url:
          type: string
          description: URL of the page where the issue occurred (optional)
          example: "https://simas.nusa.net.id/dashboard"
        "images[]":
          type: array
          items:
            type: string
            format: binary
          description: Screenshot images (1-5 files, image/* only)
          minItems: 1
          maxItems: 5

    FeedbackItem:
      type: object
      properties:
        timestamp:
          type: string
          example: "2026-06-18T10:30:00Z"
        userId:
          type: string
          example: "1"
        name:
          type: string
          example: "Budi Santoso"
        images:
          type: array
          items:
            type: string
            nullable: true
          example: ["https://cdn.example.com/feedback/1_123456_0.jpg"]
        url:
          type: string
          example: "https://simas.nusa.net.id/dashboard"
        category:
          type: string
          example: "bug"
        message:
          type: string
          example: "Button tidak berfungsi di halaman dashboard"
        type:
          type: string
          example: "bug"
        reply:
          type: string
          example: ""

    # --- Employee Schemas ---
    CreateEmployeeRequest:
      type: object
      required: [name, employeeId, jobPosition, email, phone]
      properties:
        name: { type: string, example: "Budi Santoso" }
        employeeId: { type: string, example: "EMP-001" }
        jobPosition: { type: string, example: "Software Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "employees/abc-123.png" }

    UpdateEmployeeRequest:
      type: object
      properties:
        name: { type: string, example: "Budi Santoso" }
        employeeId: { type: string, example: "EMP-001" }
        jobPosition: { type: string, example: "Senior Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "employees/abc-123.png" }

    EmployeeResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        employeeId: { type: string, example: "EMP-001" }
        name: { type: string, example: "Budi Santoso" }
        jobPosition: { type: string, example: "Software Engineer" }
        email: { type: string, format: email, example: "budi@company.com" }
        phone: { type: string, example: "081234567890" }
        photo: { type: string, nullable: true, example: "https://cdn.example.com/employees/abc-123.png" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Branch Schemas ---
    CreateBranchRequest:
      type: object
      required: [code, name]
      properties:
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Main branch in Jakarta" }

    UpdateBranchRequest:
      type: object
      properties:
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Updated description" }

    BranchResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        code: { type: string, example: "BR-001" }
        name: { type: string, example: "Jakarta Branch" }
        description: { type: string, nullable: true, example: "Main branch in Jakarta" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # --- Location Schemas ---
    CreateLocationRequest:
      type: object
      required: [branchId, name]
      properties:
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Server and networking equipment room" }

    UpdateLocationRequest:
      type: object
      properties:
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Updated description" }

    LocationResponse:
      type: object
      properties:
        id: { type: integer, example: 1 }
        branchId: { type: integer, example: 1 }
        name: { type: string, example: "Server Room" }
        description: { type: string, nullable: true, example: "Server and networking equipment room" }
        branch:
          type: object
          properties:
            id: { type: integer, example: 1 }
            code: { type: string, example: "BR-001" }
            name: { type: string, example: "Jakarta Branch" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

paths:
  # ── Register ──────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "422": { description: Validation error, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationError" } } } }

  # ── Login ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
        "401": { description: Invalid credentials }
        "422": { description: Validation error }

  # ── Google Login ──────────────────────────────────────────────────────────
  /auth/google:
    post:
      tags: [Auth]
      summary: Login with Google OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
        "400": { description: User not registered or account inactive }

  # ── Forgot Password ──────────────────────────────────────────────────────
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordRequest" }
      responses:
        "200":
          description: Password reset instructions sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Email not found or account inactive }

  # ── Validate Reset Token ─────────────────────────────────────────────────
  /auth/validate-reset-token:
    get:
      tags: [Auth]
      summary: Validate a password reset token
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Invalid or expired reset token }

  # ── Reset Password ──────────────────────────────────────────────────────
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Invalid or expired reset token }

  # ── Refresh Token ────────────────────────────────────────────────────────
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResponse" }
        "401": { description: Invalid or expired refresh token }

  # ── Me ───────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "401": { description: Unauthorized }

  /auth/profile:
    put:
      tags: [Auth]
      summary: Update current user's profile details
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileRequest" }
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  /auth/password:
    put:
      tags: [Auth]
      summary: Update current user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePasswordRequest" }
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "400": { description: Invalid old password / Old password required }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Logout ───────────────────────────────────────────────────────────────
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "401": { description: Unauthorized }

  # ── User List ────────────────────────────────────────────────────────────
  /user:
    get:
      tags: [User]
      summary: Get all users (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: Search by name or email
          schema: { type: string }
        - name: isActive
          in: query
          description: Filter by status (1 = active, 0 = inactive)
          schema: { type: string }
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AuthUser" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [User]
      summary: Create a new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── User Detail / Update / Delete ────────────────────────────────────────
  /user/{id}:
    get:
      tags: [User]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "401": { description: Unauthorized }
        "404": { description: User not found }

    put:
      tags: [User]
      summary: Update a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "404": { description: User not found }
        "422": { description: Validation error }

    delete:
      tags: [User]
      summary: Delete a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "401": { description: Unauthorized }
        "404": { description: User not found }

  # ── Feedback List ──────────────────────────────────────────────────────────
  /feedback:
    get:
      tags: [Feedback]
      summary: Get feedback list for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feedback retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/FeedbackItem" }
        "401": { description: Unauthorized }

    post:
      tags: [Feedback]
      summary: Submit new feedback with screenshots
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/StoreFeedbackRequest" }
      responses:
        "201":
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: "null"
                        example: null
        "401": { description: Unauthorized }
        "422": { description: Validation error, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationError" } } } }

  # ── Employee List ──────────────────────────────────────────────────────────
  /employee:
    get:
      tags: [Employee]
      summary: Get all employees (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: Search by name, employee ID, email, or job position
          schema: { type: string }
      responses:
        "200":
          description: Employees retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/EmployeeResponse" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [Employee]
      summary: Create a new employee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEmployeeRequest" }
      responses:
        "201":
          description: Employee created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/EmployeeResponse" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Employee Detail / Update / Delete ────────────────────────────────────
  /employee/{id}:
    get:
      tags: [Employee]
      summary: Get employee by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employee retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/EmployeeResponse" }
        "401": { description: Unauthorized }
        "404": { description: Employee not found }

    put:
      tags: [Employee]
      summary: Update an employee
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateEmployeeRequest" }
      responses:
        "200":
          description: Employee updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/EmployeeResponse" }
        "401": { description: Unauthorized }
        "404": { description: Employee not found }
        "422": { description: Validation error }

    delete:
      tags: [Employee]
      summary: Delete an employee
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employee deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaseResponse" }
        "401": { description: Unauthorized }
        "404": { description: Employee not found }

  # ── Branch List / Create ──────────────────────────────────────────────────
  /branch:
    get:
      tags: [Branch]
      summary: Get all branches (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: Search by name, code, or description
          schema: { type: string }
      responses:
        "200":
          description: Branches retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
