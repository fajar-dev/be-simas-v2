  # ── Proxy MinIO ─────────────────────────────────────────────────────────
  /proxy:
    get:
      tags: [Upload]
      summary: Proxy a file from MinIO storage
      description: "Streams a file from MinIO object storage."
      parameters:
        - name: path
          in: query
          required: true
          description: MinIO object path
          schema: { type: string, example: "users/abc-123.png" }
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400": { description: "Missing 'path' query parameter" }

  # ── Mist BLE Webhook ────────────────────────────────────────────────────
  /webhook/mist:
    post:
      tags: [Webhook]
      summary: Receive Mist BLE zone events
      description: |
        Webhook endpoint for Juniper Mist to send BLE zone events.
        When an asset's BLE tag enters a mapped zone, an asset_location record is automatically created.
        Authentication is via X-Mist-Secret header or secret query parameter (not JWT).
      parameters:
        - name: X-Mist-Secret
          in: header
          required: false
          description: Webhook secret for authentication
          schema: { type: string }
        - name: secret
          in: query
          required: false
          description: Alternative webhook secret via query parameter
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic: { type: string, example: "zone", description: "Event topic from Mist" }
                events:
                  type: array
                  items:
                    type: object
                    properties:
                      site_id: { type: string, example: "a1b2c3d4-5678-9abc-def0-123456789abc" }
                      zone_id: { type: string, example: "d4e6f7a8-1234-5678-abcd-ef0123456789" }
                      mac: { type: string, example: "aa:bb:cc:dd:ee:ff" }
                      type: { type: string, enum: [enter, exit], example: "enter" }
                      timestamp: { type: integer, example: 1719330000 }
                      name: { type: string, example: "Server Room" }
      responses:
        "200":
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          processed: { type: integer, example: 1 }
                          results:
                            type: array
                            items:
                              type: object
                              properties:
                                mac: { type: string, example: "aa:bb:cc:dd:ee:ff" }
                                status: { type: string, enum: [relocated, skipped, asset_not_found, zone_not_mapped, already_at_location, location_disabled, error], example: "relocated" }
                                assetId: { type: integer, example: 1 }
                                locationId: { type: integer, example: 1 }
        "401": { description: "Invalid webhook secret" }

  # ── AI ──────────────────────────────────────────────────────────────────────
  /ai/decode-barcode:
    post:
      tags: [AI]
      summary: Decode barcode/QR code from image
      description: |
        Upload an image containing a barcode or QR code. The AI (Gemini) will analyze
        the image and return the decoded content. Returns 400 if no code is found or
        the image is too blurry.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: "Image file containing a barcode or QR code (max 10MB, image/* only)"
      responses:
        "200":
          description: Successfully decoded barcode/QR code
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          type:
                            type: string
                            enum: [barcode, qrcode]
                            example: "barcode"
                            description: "Type of code detected"
                          content:
                            type: string
                            example: "AST-001"
                            description: "Decoded content from the barcode/QR code"
        "400":
          description: "Bad request — no code found, image unclear, or invalid file"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      success: { type: boolean, example: false }
                      statusCode: { type: integer, example: 400 }
                      message:
                        type: string
                        example: "No barcode or QR code found in the image"
        "401": { description: "Unauthorized — missing or invalid token" }

