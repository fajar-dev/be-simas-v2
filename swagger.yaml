  # ── Book (Borrow / Return) ───────────────────────────────────────────────
  /book/loan:
    get:
      tags: [Book]
      summary: Get book loans grouped by employee
      description: |
        Returns all book loans (assets in the "Buku" category) grouped by employee.
        The response is an array containing a single object keyed by employee ID.
        Each employee entry holds a `bookLoans` map keyed by the asset-holder record ID.

        Authentication: this endpoint uses the static API key (`x-api-key` header), not a bearer token.
      security:
        - apiKeyAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
          description: Filter by employee name, employee ID, or asset name.
        - in: query
          name: hasReturn
          schema: { type: boolean }
          description: "`true` = only returned loans, `false` = only active loans. Omit for all."
        - in: query
          name: startDate
          schema: { type: string }
          description: Filter by returned date (>= startDate). Combine with endDate for a range.
        - in: query
          name: endDate
          schema: { type: string }
          description: Filter by returned date (<= endDate). Combine with startDate for a range.
      responses:
        "200":
          description: Loans retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/BookLoanGroup" }
              example:
                success: true
                message: Loans retrieved successfully
                data:
                  - "EMP-BOOK-01":
                      employee: "Book Reader"
                      bookLoans:
                        "12":
                          code: "BOOK-001"
                          name: "Atomic Habits"
                          imageUrl: "http://cdn.test.com/stock/attachments/cover.jpg"
                          subCategory: "Novel"
                          loanHistory:
                            loaning:
                              loanPeriod: "2026-07-07T10:00"
                              loanPhoto: "http://cdn.test.com/stock/attachments/loan.jpg"
                            return:
                              returnTime: "2026-07-08T14:30"
                              returnPhoto: "http://cdn.test.com/stock/attachments/return.jpg"
                              linkReview: "https://www.goodreads.com/book/show/40121378"
        "401": { description: Unauthorized }

  /book/my-books:
    get:
      tags: [Book]
      summary: Get current user's borrowed books
      description: |
        Returns the list of books currently borrowed by the authenticated user.
        The user must be linked to an employee. Only active (not returned) holders are returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Borrowed books retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AssetHolderResponse" }
        "400": { description: Account not linked to an employee }
        "401": { description: Unauthorized }

  /book/borrow:
    post:
      tags: [Book]
      summary: Borrow a book
      description: |
        Borrow an asset that belongs to the "Buku" category. Validations:
        - Asset must exist and belong to the "Buku" category
        - Holder feature must be enabled on the asset
        - Asset last status must be "active"
        - Asset must not have an active holder (not currently borrowed)
        - User must be linked to an employee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BorrowBookRequest" }
      responses:
        "201":
          description: Book borrowed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AssetHolderResponse" }
        "400": { description: "Validation failed (not a book, not active, already borrowed, etc.)" }
        "401": { description: Unauthorized }
        "404": { description: Asset not found }
        "422": { description: Request body validation error }

  /book/return:
    post:
      tags: [Book]
      summary: Return a borrowed book
      description: |
        Return a previously borrowed book. The returnNote field must be a valid URL (Goodreads link).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReturnBookRequest" }
      responses:
        "200":
          description: Book returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AssetHolderResponse" }
        "400": { description: Already returned or invalid }
        "401": { description: Unauthorized }
        "404": { description: Holder record not found }
        "422": { description: Request body validation error }

