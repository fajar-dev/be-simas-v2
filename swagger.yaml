          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/BulkDeleteAssetResponse" }
        "401": { description: Unauthorized }
        "422": { description: Validation error }

  # ── Asset Export / Import ────────────────────────────────────────────────
  /asset/export:
    get:
      tags: [Asset]
      summary: Export assets to Excel
      description: |
        Exports assets as .xlsx file. Supports all the same filters as GET /asset.
        The exported file includes columns: No, Image, Code, Name, Description, Category, Sub Category, Brand, Model, BLE Tag MAC, Price, Purchase Date, Status, Active Holder (Name + Employee ID), Last Location (Location + Branch), Depreciation (Useful Life, Monthly Depreciation, Accumulated Depreciation, Book Value), and dynamic label columns.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string }
        - name: order
          in: query
          schema: { type: string, enum: [ASC, DESC] }
        - name: labelColumns
          in: query
          description: "Label keys to include as columns (comma-separated)"
          schema: { type: string, example: "serial_number,warranty" }
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401": { description: Unauthorized }

  /asset/import-template:
    get:
      tags: [Asset]
      summary: Download import template
      description: |
        Downloads an Excel template for importing assets. Includes columns: Asset Code, Name, Description, Sub Category Code, Brand, Model, BLE Tag MAC, Price, Purchase Date, Useful Life (Years), Status.
        Contains a Reference sheet with valid Sub Category codes and Status values.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Excel template file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401": { description: Unauthorized }

  /asset/import:
    post:
      tags: [Asset]
      summary: Import assets from Excel
      description: |
        Imports assets from an Excel file. The file should follow the import template format.
        Useful Life is only imported when both Price and Purchase Date are provided.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel file (.xlsx)
      responses:
        "200":
          description: Import completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          success: { type: integer, example: 8 }
                          errors:
                            type: array
                            items:
                              type: object
                              properties:
