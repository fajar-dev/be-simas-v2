          schema: { type: string, enum: [assign, return] }
      responses:
        "200":
          description: Handover fields retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/HandoverFieldResponse" }
        "400": { description: Invalid transactionType }
        "401": { description: Unauthorized }

  /handover-field/{transactionType}:
    put:
      tags: [Asset Handover]
      summary: Replace the custom field set for a transaction type
      description: Bulk-replaces all fields for the given type. Editing fields never affects handovers already created (each snapshots its values).
      security:
        - bearerAuth: []
      parameters:
        - name: transactionType
          in: path
          required: true
          schema: { type: string, enum: [assign, return] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fields]
              properties:
                fields:
                  type: array
                  items:
                    type: object
                    required: [label, type]
                    properties:
                      label: { type: string, example: "PIC Name" }
                      type: { type: string, enum: [text, number, select, radio] }
                      options: { type: array, items: { type: string }, nullable: true, description: "Required for select/radio" }
                      required: { type: boolean, example: true }
      responses:
        "200":
          description: Handover fields saved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/HandoverFieldResponse" }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing handover-field:manage permission }
        "422": { description: Validation error (e.g. options missing for select/radio) }

  /inventory:
    get:
      tags: [Inventory]
      summary: List inventory items (paginated)
      security:
        - bearerAuth: []
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 10 } }
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: sortBy, in: query, required: false, schema: { type: string, enum: [name, code, category, subCategory, unit, variantCount, balanceCount, createdAt] } }
        - { name: order, in: query, required: false, schema: { type: string, enum: [ASC, DESC] } }
      responses:
        "200":
          description: Inventory items retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryResponse" } }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }
    post:
      tags: [Inventory]
      summary: Create an inventory item (optionally with variants + initial stock)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "Kabel UTP Cat6" }
                code: { type: string, nullable: true }
                description: { type: string, nullable: true }
                image: { type: string, nullable: true, description: "Uploaded image path" }
                unit: { type: string, nullable: true, example: "Roll" }
                subCategoryId: { type: integer, nullable: true }
                labels:
                  type: array
                  items:
                    type: object
                    required: [key, value]
                    properties: { key: { type: string }, value: { type: string } }
                variants:
                  type: array
                  description: "Optional inline variants, each with optional initial stock per branch × condition."
                  items:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }
                      code: { type: string, nullable: true }
                      initialStock:
                        type: array
                        items:
                          type: object
                          required: [branchId, new, used]
                          properties:
                            branchId: { type: integer }
                            new: { type: integer, minimum: 0 }
                            used: { type: integer, minimum: 0 }
                attachmentIds: { type: array, items: { type: integer }, nullable: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InventoryResponse" }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory:create }
        "422": { description: Validation error }

  /inventory/label-keys:
    get:
      tags: [Inventory]
      summary: Distinct custom-label keys across inventory items (for list columns)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Label keys retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { type: string }, example: ["Brand", "Warna"] }
        "401": { description: Unauthorized }

  /inventory/list:
    get:
      tags: [Inventory]
      summary: List active inventory items (unpaginated, for dropdowns)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Inventory items retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryResponse" } }
        "401": { description: Unauthorized }

  /inventory/{id}:
    get:
      tags: [Inventory]
      summary: Get an inventory item by id
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Inventory item retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InventoryResponse" }
        "401": { description: Unauthorized }
        "404": { description: Not found }
    put:
      tags: [Inventory]
      summary: Update an inventory item
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                code: { type: string, nullable: true }
                description: { type: string, nullable: true }
                isActive: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InventoryResponse" }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "422": { description: Validation error }
    delete:
      tags: [Inventory]
      summary: Delete an inventory item
      description: Fails with 409 if the item still has variants.
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "409": { description: Conflict - item still has variants }

  /inventory-variant:
    get:
      tags: [Inventory]
      summary: List variants of an inventory item
      security:
        - bearerAuth: []
      parameters:
        - { name: inventoryId, in: query, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Stock variants retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryVariantResponse" } }
        "400": { description: inventoryId is required }
        "401": { description: Unauthorized }
    post:
      tags: [Inventory]
      summary: Create a stock variant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inventoryId, name]
              properties:
                inventoryId: { type: integer, example: 1 }
                name: { type: string, example: "305m / Roll" }
                code: { type: string, nullable: true }
                unit: { type: string, default: "pcs", example: "roll" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InventoryVariantResponse" }
        "401": { description: Unauthorized }
        "404": { description: Inventory item not found }
        "422": { description: Validation error }

  /inventory-variant/{id}:
    get:
      tags: [Inventory]
      summary: Get a stock variant by id
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Stock variant retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InventoryVariantResponse" }
        "401": { description: Unauthorized }
        "404": { description: Not found }
    put:
      tags: [Inventory]
      summary: Update a stock variant
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                code: { type: string, nullable: true }
                unit: { type: string }
                isActive: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InventoryVariantResponse" }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "422": { description: Validation error }
    delete:
      tags: [Inventory]
      summary: Delete a stock variant
      description: Fails with 409 if the variant still has stock balances.
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }
        "401": { description: Unauthorized }
        "404": { description: Not found }
        "409": { description: Conflict - variant still has stock balances }

  /inventory/stock:
    get:
      tags: [Inventory]
      summary: Monitor stock balances across branches (paginated)
      security:
        - bearerAuth: []
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: branchId, in: query, required: false, schema: { type: integer } }
        - { name: inventoryId, in: query, required: false, schema: { type: integer } }
        - { name: variantId, in: query, required: false, schema: { type: integer } }
        - { name: condition, in: query, required: false, schema: { type: string, enum: [new, used] } }
      responses:
        "200":
          description: Stock balances retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockBalanceResponse" } }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

  /inventory/stock/entry-template:
    get:
      tags: [Inventory]
      summary: Get the nested-input entry template for a branch + inventory item
      description: Returns each variant with its current on-hand new/used quantities, ready for the stock entry table.
      security:
        - bearerAuth: []
      parameters:
        - { name: branchId, in: query, required: true, schema: { type: integer } }
        - { name: inventoryId, in: query, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Entry template retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockEntryTemplateResponse" } }
        "400": { description: branchId and inventoryId are required }
        "401": { description: Unauthorized }

  /inventory/stock/entry:
    post:
      tags: [Inventory]
      summary: Set stock quantities (opname) for a branch + inventory item
      description: SET semantics — each variant's new/used values become the absolute on-hand quantity. A movement is recorded with the signed delta.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branchId, inventoryId, items]
              properties:
                branchId: { type: integer, example: 1 }
                inventoryId: { type: integer, example: 1 }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [variantId, new, used]
                    properties:
                      variantId: { type: integer, example: 1 }
                      new: { type: integer, minimum: 0, example: 10 }
                      used: { type: integer, minimum: 0, example: 3 }
      responses:
        "200":
          description: Stock saved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockBalanceResponse" } }
        "400": { description: Invalid branch/item or variant not belonging to item }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory-stock:entry }
        "422": { description: Validation error }

  /inventory/stock/add:
    post:
      tags: [Inventory]
      summary: Add (stock-in) quantities to variants across one or more branches
      description: ADD semantics — quantities are added to each variant's current on-hand at its branch (increment, not opname). Multi-branch × multi-variant. Optional note + attachments (linked to the created movements). A movement of type `entry` is recorded per condition.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inventoryId, items]
              properties:
                inventoryId: { type: integer, example: 1 }
                note: { type: string, nullable: true }
                attachmentIds: { type: array, items: { type: integer }, nullable: true }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [branchId, variantId, new, used]
                    properties:
                      branchId: { type: integer, example: 1 }
                      variantId: { type: integer, example: 1 }
                      new: { type: integer, minimum: 0, example: 5 }
                      used: { type: integer, minimum: 0, example: 0 }
      responses:
        "201":
          description: Stock added successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockBalanceResponse" } }
        "400": { description: Invalid branch/item or variant not belonging to item }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory-stock:entry }
        "422": { description: Validation error }

  /inventory/stock/transfer:
    get:
      tags: [Inventory]
      summary: List stock transfer history for an inventory item (paginated)
      security:
        - bearerAuth: []
      parameters:
        - { name: inventoryId, in: query, required: true, schema: { type: integer } }
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Transfer history retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockTransferResponse" } }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "400": { description: inventoryId is required }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory-stock:read }
    post:
      tags: [Inventory]
      summary: Transfer stock between branches
      description: Moves the given quantity per variant+condition from source to destination branch atomically. Condition is preserved; stock cannot go negative. Persists a transfer record (history + attachments).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromBranchId, toBranchId, items]
              properties:
                fromBranchId: { type: integer, example: 1 }
                toBranchId: { type: integer, example: 2 }
                note: { type: string, nullable: true }
                attachmentIds: { type: array, items: { type: integer }, nullable: true }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [variantId, condition, quantity]
                    properties:
                      variantId: { type: integer, example: 1 }
                      condition: { type: string, enum: [new, used] }
                      quantity: { type: integer, minimum: 1, example: 3 }
      responses:
        "200": { description: Stock transferred successfully }
        "400": { description: Same branch, insufficient stock, or duplicate variant+condition }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory-stock:transfer }
        "422": { description: Validation error }

  /inventory/stock/movement:
    get:
      tags: [Inventory]
      summary: List stock movement ledger (paginated)
      security:
        - bearerAuth: []
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: inventoryId, in: query, required: false, schema: { type: integer } }
        - { name: branchId, in: query, required: false, schema: { type: integer } }
        - { name: variantId, in: query, required: false, schema: { type: integer } }
        - { name: condition, in: query, required: false, schema: { type: string, enum: [new, used] } }
        - { name: type, in: query, required: false, schema: { type: string, enum: [entry, adjustment, transfer_out, transfer_in, assign_out, return_in] } }
      responses:
        "200":
          description: Stock movements retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockMovementResponse" } }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

  /inventory/stock/holding:
    get:
      tags: [Inventory]
      summary: List stock holdings (who holds how much, paginated)
      security:
        - bearerAuth: []
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: inventoryId, in: query, required: false, schema: { type: integer } }
        - { name: variantId, in: query, required: false, schema: { type: integer } }
        - { name: employeeId, in: query, required: false, schema: { type: integer } }
        - { name: branchId, in: query, required: false, schema: { type: integer } }
        - { name: active, in: query, required: false, schema: { type: boolean }, description: "Only holdings with a remaining quantity." }
      responses:
        "200":
          description: Stock holdings retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockHoldingResponse" } }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

  /inventory/stock/assign:
    post:
      tags: [Inventory]
      summary: Assign stock from a branch to an employee (manual)
      description: Reduces the branch's on-hand quantity for the chosen condition (never negative) and records a holding. Also reused by handover approval.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, items]
              properties:
                employeeId: { type: integer, example: 1 }
                note: { type: string, nullable: true }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [variantId, branchId, condition, quantity]
                    properties:
                      variantId: { type: integer, example: 1 }
                      branchId: { type: integer, example: 1 }
                      condition: { type: string, enum: [new, used] }
                      quantity: { type: integer, minimum: 1, example: 4 }
      responses:
        "201":
          description: Stock assigned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InventoryStockHoldingResponse" } }
        "400": { description: Inactive employee, invalid branch/variant, or insufficient stock }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory-stock:assign }
        "422": { description: Validation error }

  /inventory/stock/return:
    post:
      tags: [Inventory]
      summary: Return stock an employee holds (manual)
      description: Returned stock always comes back as `used` at the given branch. Cannot exceed what the employee still holds; holdings are consumed oldest-first.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeId, items]
              properties:
                employeeId: { type: integer, example: 1 }
                note: { type: string, nullable: true }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [variantId, branchId, quantity]
                    properties:
                      variantId: { type: integer, example: 1 }
                      branchId: { type: integer, example: 1, description: "Branch to receive the returned (used) stock." }
                      quantity: { type: integer, minimum: 1, example: 3 }
      responses:
        "200": { description: Stock returned successfully }
        "400": { description: Invalid branch/variant, or return exceeds what the employee holds }
        "401": { description: Unauthorized }
        "403": { description: Forbidden - missing inventory-stock:return }
        "422": { description: Validation error }

  /asset-log:
    get:
      tags: [Asset Log]
      summary: Get asset activity logs (audit trail)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: sortBy
          in: query
          required: false
          schema: { type: string }
        - name: order
          in: query
          required: false
          schema: { type: string, enum: [ASC, DESC] }
        - name: assetId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Asset activity logs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AssetLogResponse" }
        "401": { description: Unauthorized }

  # ── Asset Status ─────────────────────────────────────────────────────────
