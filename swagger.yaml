        "400": { description: Email already in use }
        "401": { description: Unauthorized }
        "404": { description: User not found }
        "422": { description: Validation error }

    delete:
      tags: [User]
      summary: Soft delete a user
      description: |
        Performs a soft delete on the user. The user record is retained in the database
        but marked as deleted (deletedAt is set). The email is cleared so it can be reused.
        The user is deactivated and can no longer log in. References to this user
        (e.g. createdBy in asset logs) are preserved.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User soft-deleted successfully
