  # ── Asset Bulk Delete ───────────────────────────────────────────────────
  /asset/bulk-delete:
    post:
      tags: [Asset]
      summary: Bulk delete assets
      description: Delete multiple assets at once. Assets that cannot be deleted (e.g. have active holders, location history, or maintenance records) will be reported in the `failed` array.
      security:
