  # ── Upload File ──────────────────────────────────────────────────────────
  /upload:
    post:
      tags: [Upload]
      summary: Upload a file to MinIO
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          path: { type: string, example: "users/abc-123.png" }
        "400": { description: No file uploaded or invalid file }
        "401": { description: Unauthorized }

