  # ── Asset List / Create ──────────────────────────────────────────────────
  /asset:
    get:
      tags: [Asset]
      summary: Get all assets (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: q
          in: query
          description: "Search across: asset name, code, brand, model, description, category, sub-category, employee name, employee ID, location, branch, label key, label value"
          schema: { type: string }
        - name: sortBy
          in: query
          description: Field to sort by
          schema: { type: string, enum: [name, code, brand, model, price, purchaseDate, createdAt, category, subCategory, location, holder, lastLocation, activeHolder, bookValue] }
        - name: order
          in: query
          description: Sort order
          schema: { type: string, enum: [ASC, DESC], default: DESC }
        - name: categoryIds
          in: query
          description: "Filter by category IDs (comma-separated)"
          schema: { type: string, example: "1,2,3" }
        - name: subCategoryIds
          in: query
          description: "Filter by sub-category IDs (comma-separated)"
          schema: { type: string, example: "1,2" }
        - name: branchIds
          in: query
          description: "Filter by branch IDs (comma-separated)"
          schema: { type: string, example: "1,2" }
        - name: locationIds
          in: query
          description: "Filter by location IDs (comma-separated)"
          schema: { type: string, example: "1,2" }
        - name: holderStatus
          in: query
          description: "Filter by holder status"
          schema: { type: string, enum: [has_holder, no_holder] }
        - name: holderType
          in: query
          description: "Filter by holder type (only when holderStatus=has_holder). active_holder = currently assigned, historical_holder = any holder ever assigned"
          schema: { type: string, enum: [active_holder, historical_holder] }
        - name: holderId
          in: query
          description: "Filter by holder employee ID. Uses active holder by default, or historical holder if holderType=historical_holder"
          schema: { type: integer }
        - name: bleTagStatus
          in: query
          description: "Filter by BLE tag status"
          schema: { type: string, enum: [has_ble_tag, no_ble_tag] }
        - name: priceMin
          in: query
          description: "Filter minimum price (excludes NULL prices)"
          schema: { type: integer }
        - name: priceMax
          in: query
          description: "Filter maximum price (excludes NULL prices)"
          schema: { type: integer }
        - name: purchaseDateFrom
          in: query
          description: "Filter from purchase date (excludes NULL dates)"
          schema: { type: string, format: date }
        - name: purchaseDateTo
          in: query
          description: "Filter to purchase date (excludes NULL dates)"
          schema: { type: string, format: date }
        - name: statuses
          in: query
          description: "Filter by asset statuses (comma-separated)"
          schema: { type: string, example: "active,idle" }
        - name: missingFields
          in: query
          description: "Filter by data quality (missing fields, comma-separated)"
          schema: { type: string, example: "price,brand,purchaseDate" }
        - name: depreciationStatus
          in: query
          description: "Filter by depreciation status"
          schema: { type: string, enum: [has_depreciation, no_depreciation, fully_depreciated] }
        - name: usefulLifeOp
          in: query
          description: "Operator for useful life filter"
          schema: { type: string, enum: ['<', '>', '='] }
        - name: usefulLifeYears
          in: query
          description: "Useful life in years"
          schema: { type: integer, example: 5 }
        - name: monthlyDepMin
          in: query
          description: "Min monthly depreciation"
          schema: { type: number, example: 100000 }
        - name: monthlyDepMax
          in: query
          description: "Max monthly depreciation"
          schema: { type: number, example: 500000 }
        - name: accumulatedDepMin
          in: query
          description: "Min accumulated depreciation"
          schema: { type: number, example: 1000000 }
        - name: accumulatedDepMax
          in: query
          description: "Max accumulated depreciation"
          schema: { type: number, example: 5000000 }
        - name: bookValueMin
          in: query
          description: "Min book value"
          schema: { type: number, example: 1000000 }
        - name: bookValueMax
          in: query
          description: "Max book value"
          schema: { type: number, example: 10000000 }
      responses:
        "200":
          description: Assets retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AssetResponse" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { description: Unauthorized }

    post:
      tags: [Asset]
      summary: Create a new asset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAssetRequest" }
      responses:
        "201":
          description: Asset created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AssetResponse" }
        "401": { description: Unauthorized }
        "400": { description: Bad request (duplicate code, etc) }
        "422": { description: Validation error }

