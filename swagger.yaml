          schema: { type: integer, default: 10 }
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [pending, approve, reject, cancel] }
        - name: transactionType
          in: query
          schema: { type: string, enum: [assign, return] }
      responses:
        "200":
          description: Asset handovers retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/HandoverResponse" }
        "401": { description: Unauthorized }

    post:
      tags: [Asset Handover]
      summary: Create an asset handover (status pending)
      description: "Creates a handover document, generates the 'FORM SERAH TERIMA ASET/BARANG' PDF (returned as an attachment), and submits it to the e-sign provider for signing. Each item's asset must have no active holder and must not be part of another pending handover. One employee may receive multiple assets. Approval/rejection is driven by the e-sign webhook (POST /webhook/esign), not a direct endpoint."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateHandoverRequest" }
      responses:
        "201":
          description: Asset handover created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/HandoverResponse" }
        "400": { description: "Asset already has a holder, is in another pending handover, duplicated, or employee inactive" }
        "401": { description: Unauthorized }
        "404": { description: Asset or Employee not found }
        "422": { description: Validation error }

